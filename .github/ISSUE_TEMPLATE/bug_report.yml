name: Bug Report
description: Create a report to help us improve 30tools
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: input
    id: tool-url
    attributes:
      label: Tool URL
      description: If the bug is on a specific tool page, please provide the URL.
      placeholder: https://30tools.com/your-tool-here
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction Steps
      description: How do we reproduce the bug?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Browser, OS, version, etc.
      placeholder: Chrome 120 on Windows 11
